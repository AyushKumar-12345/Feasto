services:
  - type: static
    name: feasto-frontend-yd60
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    redirects:
      - source: /*
        destination: /index.html
        type: rewrite

  - type: static
    name: feasto-admin-5h3g
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    redirects:
      - source: /*
        destination: /index.html
        type: rewrite